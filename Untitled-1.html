<script>
const CAR_DATA = <?= json_encode($CAR_DATA, JSON_UNESCAPED_UNICODE) ?>;

const brandSelect = document.getElementById("brand");
const modelSelect = document.getElementById("model");

brandSelect.addEventListener("change", function () {
    modelSelect.innerHTML = '<option value="">Избери модел</option>';
    modelSelect.disabled = true;

    const brand = this.value;
    if (!brand || !CAR_DATA[brand]) return;

    Object.entries(CAR_DATA[brand]).forEach(([model, versions]) => {
        // model header (disabled)
        const groupOpt = document.createElement("option");
        groupOpt.textContent = "— " + model + " —";
        groupOpt.disabled = true;
        modelSelect.appendChild(groupOpt);

        // versions under model
        versions.forEach(version => {
            const opt = document.createElement("option");
            opt.value = model + " " + version;
            opt.textContent = model + " " + version;
            modelSelect.appendChild(opt);
        });
    });

    modelSelect.disabled = false;
});
</script>
